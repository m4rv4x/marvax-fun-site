<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Status - MARVAX</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 2rem 1rem;
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .header {
      margin-bottom: 3rem;
      text-align: center;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #00d4ff, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #9ca3af;
      font-size: 0.875rem;
    }
    .overall-status {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 1rem;
      padding: 2rem;
      margin-bottom: 2rem;
      text-align: center;
    }
    .overall-status.operational { border-color: #065f46; }
    .overall-status.degraded { border-color: #92400e; }
    .overall-status.down { border-color: #7f1d1d; }
    .overall-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 1rem;
    }
    .overall-badge.operational {
      background: #065f46;
      color: #34d399;
    }
    .overall-badge.degraded {
      background: #92400e;
      color: #fbbf24;
    }
    .overall-badge.down {
      background: #7f1d1d;
      color: #f87171;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .dot.up { background: #34d399; }
    .dot.degraded { background: #fbbf24; }
    .dot.down { background: #f87171; }
    .dot.checking {
      background: #6b7280;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .services {
      display: grid;
      gap: 1rem;
    }
    .service-card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 0.75rem;
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.2s;
    }
    .service-card:hover {
      border-color: #404040;
    }
    .service-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .service-name {
      font-weight: 600;
      font-size: 1rem;
    }
    .service-url {
      font-size: 0.75rem;
      color: #6b7280;
      margin-top: 0.25rem;
    }
    .service-status {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.25rem;
    }
    .status-text {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-text.up { color: #34d399; }
    .status-text.degraded { color: #fbbf24; }
    .status-text.down { color: #f87171; }
    .status-text.checking { color: #6b7280; }
    .response-time {
      font-size: 0.75rem;
      color: #9ca3af;
    }
    .footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.75rem;
      color: #6b7280;
    }
    .footer a {
      color: #00d4ff;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
    .refresh-btn {
      background: #1f2937;
      border: 1px solid #374151;
      color: #d1d5db;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.875rem;
      margin-top: 1rem;
      transition: background 0.2s;
    }
    .refresh-btn:hover {
      background: #374151;
    }
    .last-check {
      font-size: 0.75rem;
      color: #6b7280;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">MARVAX</div>
      <div class="subtitle">System Status</div>
    </div>

    <div class="overall-status operational" id="overallStatus">
      <div class="overall-badge operational" id="overallBadge">
        <div class="dot checking"></div>
        <span>Checking...</span>
      </div>
      <div class="last-check" id="lastCheck"></div>
      <button class="refresh-btn" onclick="checkAllServices()">↻ Refresh</button>
    </div>

    <div class="services" id="servicesList"></div>

    <div class="footer">
      Powered by <a href="https://marvax.fun">MARVAX</a> •
      <a href="/">Home</a> •
      <a href="/docs">Docs</a> •
      <a href="/privacy">Privacy</a>
    </div>
  </div>

  <script>
    const SERVICES = [
      {
        name: 'API',
        url: 'https://api.marvax.fun',
        endpoint: '/health',
        description: 'Main API endpoint'
      },
      {
        name: 'User Portal',
        url: 'https://api.marvax.fun',
        endpoint: '/user',
        description: 'User management portal'
      },
      {
        name: 'Blog',
        url: 'https://blog.marvax.fun',
        endpoint: '/',
        description: 'Blog & documentation'
      },
      {
        name: 'Office',
        url: 'https://office.marvax.fun',
        endpoint: '/',
        description: 'Office suite'
      },
      {
        name: 'GitHub Pages',
        url: 'https://marvax.fun',
        endpoint: '/',
        description: 'Main website'
      }
    ];

    const state = {
      services: {},
      lastCheck: null
    };

    async function checkService(service) {
      const startTime = Date.now();
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 8000);
        
        const response = await fetch(service.url + service.endpoint, {
          method: 'HEAD',
          signal: controller.signal,
          mode: 'no-cors'
        });
        
        clearTimeout(timeout);
        const responseTime = Date.now() - startTime;
        
        return {
          status: 'up',
          responseTime,
          message: 'Operational'
        };
      } catch (err) {
        const responseTime = Date.now() - startTime;
        
        if (err.name === 'AbortError') {
          return {
            status: 'down',
            responseTime,
            message: 'Timeout'
          };
        }
        
        // no-cors mode returns opaque responses, so we assume it's working
        if (responseTime < 5000) {
          return {
            status: 'up',
            responseTime,
            message: 'Operational'
          };
        }
        
        return {
          status: 'down',
          responseTime,
          message: 'Unreachable'
        };
      }
    }

    function renderService(service, status) {
      const statusClass = status?.status || 'checking';
      const statusText = status?.message || 'Checking...';
      const responseTime = status?.responseTime ? `${status.responseTime}ms` : '—';

      return `
        <div class="service-card">
          <div class="service-info">
            <div class="dot ${statusClass}"></div>
            <div>
              <div class="service-name">${service.name}</div>
              <div class="service-url">${service.url}</div>
            </div>
          </div>
          <div class="service-status">
            <div class="status-text ${statusClass}">${statusText}</div>
            <div class="response-time">${responseTime}</div>
          </div>
        </div>
      `;
    }

    function updateOverallStatus() {
      const statuses = Object.values(state.services);
      const downCount = statuses.filter(s => s.status === 'down').length;
      const degradedCount = statuses.filter(s => s.status === 'degraded').length;

      const overallStatusEl = document.getElementById('overallStatus');
      const overallBadgeEl = document.getElementById('overallBadge');

      if (downCount > 0) {
        overallStatusEl.className = 'overall-status down';
        overallBadgeEl.className = 'overall-badge down';
        overallBadgeEl.innerHTML = '<div class="dot down"></div><span>System Degraded</span>';
      } else if (degradedCount > 0) {
        overallStatusEl.className = 'overall-status degraded';
        overallBadgeEl.className = 'overall-badge degraded';
        overallBadgeEl.innerHTML = '<div class="dot degraded"></div><span>Partial Outage</span>';
      } else if (statuses.length === SERVICES.length) {
        overallStatusEl.className = 'overall-status operational';
        overallBadgeEl.className = 'overall-badge operational';
        overallBadgeEl.innerHTML = '<div class="dot up"></div><span>All Systems Operational</span>';
      }
    }

    function renderServices() {
      const servicesListEl = document.getElementById('servicesList');
      servicesListEl.innerHTML = SERVICES.map(service => 
        renderService(service, state.services[service.name])
      ).join('');
    }

    async function checkAllServices() {
      state.lastCheck = new Date();
      document.getElementById('lastCheck').textContent = 
        `Last checked: ${state.lastCheck.toLocaleTimeString()}`;

      // Reset to checking state
      state.services = {};
      renderServices();

      // Check all services concurrently
      const checks = SERVICES.map(async service => {
        const status = await checkService(service);
        state.services[service.name] = status;
        renderServices();
        updateOverallStatus();
      });

      await Promise.all(checks);
    }

    // Initial check
    renderServices();
    checkAllServices();

    // Auto-refresh every 60 seconds
    setInterval(checkAllServices, 60000);
  </script>
</body>
</html>
