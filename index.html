<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MARVAX.FUN - PORTAL</title>
  <meta name="description" content="Marvax user portal with OpenAI endpoint docs, webchat, user access, privacy pages, and service status." />
  <link rel="preload" as="image" href="/hero-bg.jpg" />
  <link rel="stylesheet" href="/assets/index-jPccYtsc.css" />
  <style>
    .marvax-extra-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      color: #fff;
      text-decoration: none;
      font: 600 14px/1 Inter, system-ui, sans-serif;
      transition: border-color .2s ease, color .2s ease, background .2s ease;
    }
    .marvax-extra-link:hover {
      border-color: rgba(53,242,255,.45);
      color: #35f2ff;
      background: rgba(53,242,255,.08);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    (() => {
      const LINKS = [
        { key: 'blog', label: 'Blog', href: 'https://blog.marvax.fun' },
        { key: 'office', label: 'Office', href: 'https://office.marvax.fun' },
      ];
      const CTA_TEXT = new Set(['portal section', 'docs section']);
      const NAV_TEXT = new Set(['portal', 'docs', 'status', 'contact', 'home', 'launch', 'openclaw', 'webchat', 'pricing', 'privacy', 'user', 'login', 'github', 'discord']);

      function findHostByText(textSet, selector, topLimit = Infinity) {
        const nodes = Array.from(document.querySelectorAll(selector)).filter((node) => {
          const text = (node.textContent || '').trim().toLowerCase();
          return textSet.has(text);
        });
        if (nodes.length < 2) return null;
        const parents = new Map();
        for (const node of nodes) {
          const parent = node.parentElement;
          if (!parent) continue;
          const rect = typeof parent.getBoundingClientRect === 'function' ? parent.getBoundingClientRect() : null;
          if (rect && rect.top > topLimit) continue;
          parents.set(parent, (parents.get(parent) || 0) + 1);
        }
        return [...parents.entries()].sort((a, b) => b[1] - a[1])[0]?.[0] || null;
      }

      function findLinkHost() {
        return findHostByText(CTA_TEXT, 'button, a', 1000) || findHostByText(NAV_TEXT, 'a[href]', 220);
      }

      function ensureLinks() {
        const host = findLinkHost();
        if (!host) return false;
        const sample = host.querySelector('a[href]');
        for (const link of LINKS) {
          if (host.querySelector(`[data-marvax-link="${link.key}"]`)) continue;
          const a = document.createElement('a');
          a.href = link.href;
          a.textContent = link.label;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.dataset.marvaxLink = link.key;
          a.className = sample?.className || 'marvax-extra-link';
          if (!a.className) a.className = 'marvax-extra-link';
          host.appendChild(a);
        }
        return true;
      }

      function boot() {
        if (ensureLinks()) return;
        let tries = 0;
        const timer = setInterval(() => {
          tries += 1;
          if (ensureLinks() || tries > 80) clearInterval(timer);
        }, 250);
        const observer = new MutationObserver(() => ensureLinks());
        observer.observe(document.documentElement, { childList: true, subtree: true });
        setTimeout(() => observer.disconnect(), 20000);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot, { once: true });
      } else {
        boot();
      }
    })();
  </script>
  <script src="/assets/index-CoefIrm6.js" type="module"></script>
</body>
</html>
